<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Master Pro - Offline</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: #0f172a;
        color: #ffffff;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        text-align: center;
      }
      .brand {
        font-size: 24px;
        font-weight: bold;
        color: #10b981;
        margin-bottom: 20px;
      }
      .title {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 10px;
      }
      .message {
        font-size: 14px;
        color: #94a3b8;
        margin-bottom: 30px;
        max-width: 250px;
      }
      .btn {
        background-color: #10b981;
        color: #ffffff;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .btn:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="brand">PDF Master Pro</div>
    <div class="title">You're offline</div>
    <div class="message">Check your internet connection and try again.</div>
    <button class="btn" onclick="window.location.reload()">Try again</button>
  </body>
</html>
