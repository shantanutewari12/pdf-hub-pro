      <stop offset="0%" stop-color="#1a6b4a"/>
      <stop offset="100%" stop-color="#0f4030"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a843"/>
